sonar.projectKey=vil-ai-assistant
sonar.projectName=VIL AI Assistant
sonar.organization=josmaryppirelag17

# Fuentes y tests
sonar.sources=src/
sonar.tests=tests/

# Excluir del análisis principal (estos archivos no se analizan NUNCA)
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/playwright-report/**,\
  **/test-results/**,\
  **/coverage/**,\
  **/dist/**,\
  **/build/**,\
  **/src/lib/i18n/translations.ts

# Excluir tests del análisis de duplicación (CRUCIAL)
sonar.cpd.exclusions=\
  **/tests/**/*,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/__tests__/**/*

# Los tests se incluyen para coverage (pero no para duplicación)
sonar.test.inclusions=\
  **/tests/**/*.test.ts,\
  **/tests/**/*.test.tsx,\
  **/__tests__/**/*

# Configuración de coverage
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Excluir tests del coverage
sonar.coverage.exclusions=\
  **/tests/**/*,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/playwright-report/**/*,\
  **/test-results/**/*