sonar.projectKey=Josmaryppirelag17_Vil-Ai-Assitant
sonar.projectName=VIL AI Assistant
sonar.organization=josmaryppirelag17

# Fuentes (solo src/, NO tests — se excluyen completamente)
sonar.sources=src/

# Excluir del análisis principal (estos archivos no se analizan NUNCA)
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/playwright-report/**,\
  **/test-results/**,\
  **/coverage/**,\
  **/dist/**,\
  **/build/**,\
  **/tests/**/*,\
  **/src/lib/i18n/translations.ts

# Configuración de coverage (excluye tests automáticamente via sonar.exclusions)
sonar.typescript.lcov.reportPaths=coverage/lcov.info
