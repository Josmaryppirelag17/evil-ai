# Fuentes (solo src/, NO tests — se excluyen completamente)
sonar.sources=src/

# Excluir del análisis principal (estos archivos no se analizan NUNCA)
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/playwright-report/**,\
  **/test-results/**,\
  **/coverage/**,\
  **/dist/**,\
  **/build/**,\
  **/tests/**/*,\
  **/src/lib/i18n/translations.ts

